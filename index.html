<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SING PARTY!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Updated Theme Colors for Singing/Karaoke */
            --gold: #ffcc00;
            --royal-purple: #9d00ff;
            --deep-violet: #4e008a;
            --game-scale: 28vh; 
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation; /* Prevents iPad zoom on double tap */
        }

        #bg-video-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .banner-space {
            height: 30vh;
            width: 100%;
        }

        .game-area-bottom {
            height: 70vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vh;
            z-index: 1;
            margin-bottom: 2vh;
        }

        .box {
            width: var(--game-scale); 
            height: var(--game-scale);
            border: 0.6vh solid rgba(157, 0, 255, 0.5);
            border-radius: 4vh;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-image: url('box-design.png');
            background-color: rgba(0,0,0,0.4);
            box-shadow: 0 0 2vh rgba(157, 0, 255, 0.4);
            animation: borderPulse 3s infinite alternate;
        }

        @keyframes borderPulse {
            from { border-color: var(--royal-purple); box-shadow: 0 0 1vh var(--royal-purple); }
            to { border-color: var(--gold); box-shadow: 0 0 3vh var(--gold); }
        }

        .box.shimmer {
            border-color: var(--gold) !important;
            box-shadow: 0 0 10vh var(--gold) !important;
            transform: scale(1.1);
            filter: brightness(1.8);
            z-index: 10;
        }

        #start-btn {
            padding: 2vh 10vw;
            font-size: 6vh;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(45deg, var(--royal-purple), var(--gold));
            color: white;
            border: none;
            border-radius: 100px;
            box-shadow: 0 0 5vh var(--royal-purple);
            z-index: 10;
        }

        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 500;
            justify-content: center;
            align-items: center;
            font-size: 25vh;
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 50px var(--gold);
        }

        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 600;
        }

        #video-blur-bg {
            position: absolute;
            width: 120%; height: 120%;
            top: -10%; left: -10%;
            object-fit: cover;
            filter: blur(40px) brightness(0.4);
            z-index: 601;
        }

        #game-video {
            position: relative;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 602;
        }

        .controls-top {
            position: fixed; top: 20px; left: 20px;
            display: flex; gap: 15px; z-index: 200;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px;
            border: 1px solid var(--gold); backdrop-filter: blur(10px);
        }

        #fullscreen-btn {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            z-index: 200; backdrop-filter: blur(10px); border: 2px solid var(--gold);
        }
    </style>
</head>
<body>

    <video id="bg-video-main" autoplay muted loop playsinline>
        <source src="background-loop.mp4" type="video/mp4">
    </video>

    <div class="controls-top">
        <input type="range" id="size-slider" min="15" max="32" value="28" oninput="adjustSize(this.value)">
    </div>

    <div id="fullscreen-btn" onclick="toggleFullScreen()">
        <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    </div>

    <div class="banner-space"></div>

    <div class="game-area-bottom">
        <div id="game-grid">
            <div class="box" id="box-0"></div>
            <div class="box" id="box-1"></div>
            <div class="box" id="box-2"></div>
            <div class="box" id="box-3"></div>
            <div class="box" id="box-4"></div>
            <div class="box" id="box-5"></div>
            <div class="box" id="box-6"></div>
            <div class="box" id="box-7"></div>
            <div class="box" id="box-8"></div>
            <div class="box" id="box-9"></div>
        </div>
        <button id="start-btn" onclick="runSelectionCycle()">SING!</button>
    </div>

    <div id="countdown-overlay">READY?</div>

    <div id="video-overlay">
        <video id="video-blur-bg" muted playsinline></video>
        <video id="game-video" playsinline></video>
    </div>

    <audio id="sfx-shimmer" src="shimmer.mp3" loop></audio>
    <audio id="sfx-stop" src="reveal.mp3"></audio>

    <script>
        // Updated to your 5 song files
        const songVideos = ["song1.mp4", "song2.mp4", "song3.mp4", "song4.mp4", "song5.mp4"];
        const goodJobVideo = "good-job.mp4";
        
        const boxes = document.querySelectorAll('.box');
        const overlay = document.getElementById('video-overlay');
        const countOverlay = document.getElementById('countdown-overlay');
        const videoPlayer = document.getElementById('game-video');
        const blurPlayer = document.getElementById('video-blur-bg');
        const startBtn = document.getElementById('start-btn');
        const sfxShimmer = document.getElementById('sfx-shimmer');
        const sfxStop = document.getElementById('sfx-stop');

        function adjustSize(val) { document.documentElement.style.setProperty('--game-scale', val + 'vh'); }

        function toggleFullScreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            // Support for iPad/Safari and standard browsers
            const request = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
            const cancel = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;
            
            if (!doc.fullscreenElement && !doc.webkitFullscreenElement) { 
                if (request) request.call(docEl); 
            } else { 
                if (cancel) cancel.call(doc); 
            }
        }

        function runSelectionCycle() {
            startBtn.style.visibility = 'hidden';
            let count = 0;
            let duration = 15 + Math.floor(Math.random() * 10);
            sfxShimmer.play();
            
            const interval = setInterval(() => {
                boxes.forEach(b => b.classList.remove('shimmer'));
                boxes[count % 10].classList.add('shimmer');
                count++;
                if (count > duration) {
                    clearInterval(interval);
                    sfxShimmer.pause();
                    sfxShimmer.currentTime = 0;
                    startCountdown(count % 10);
                }
            }, 130);
        }

        function startCountdown(boxIndex) {
            sfxStop.play();
            countOverlay.style.display = 'flex';
            let timer = 3;
            countOverlay.innerText = "READY?";
            
            const countInterval = setInterval(() => {
                if (timer > 0) {
                    countOverlay.innerText = timer;
                    timer--;
                } else if (timer === 0) {
                    countOverlay.innerText = "GO!";
                    timer--;
                } else {
                    clearInterval(countInterval);
                    countOverlay.style.display = 'none';
                    // We use % 5 because we have 10 boxes but only 5 song files
                    playSequence(boxIndex % 5);
                }
            }, 800);
        }

        function playSequence(index) {
            overlay.style.display = 'block';
            startVideo(songVideos[index]);
            
            videoPlayer.onended = () => {
                if(videoPlayer.getAttribute('src') !== goodJobVideo) {
                    startVideo(goodJobVideo);
                } else {
                    overlay.style.display = 'none';
                    startBtn.style.visibility = 'visible';
                    boxes.forEach(b => b.classList.remove('shimmer'));
                    blurPlayer.pause();
                }
            };
        }

        function startVideo(src) {
            videoPlayer.src = src;
            blurPlayer.src = src;
            videoPlayer.load(); // Forces reload for mobile/iPad
            videoPlayer.play();
            blurPlayer.play();
        }
    </script>
</body>
</html>
