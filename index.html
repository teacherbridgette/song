<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Song Roulette</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-yellow: #f0ff00;
            --hot-pink: #ff007f;
            --electric-blue: #00e5ff;
        }

        body, html {
            background: #000;
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            touch-action: manipulation;
        }

        #bg-video-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Container focused on TOP alignment to respect the banner */
        .game-area {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Align to top */
            box-sizing: border-box;
        }

        /* PHYSICAL SPACER FOR YOUR BANNER */
        .banner-spacer {
            height: 45vh; /* This reserves the top 45% of the screen for your banner */
            width: 100%;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 900px;
            margin-bottom: 30px;
        }

        .box {
            aspect-ratio: 1/1;
            border: 4px solid var(--electric-blue);
            border-radius: 15px;
            background: rgba(0,0,0,0.5) url('box-design.png') center/contain no-repeat;
            transition: all 0.15s ease;
        }

        .shimmer {
            border-color: var(--neon-yellow) !important;
            box-shadow: 0 0 40px var(--neon-yellow);
            transform: scale(1.1);
        }

        #start-btn {
            padding: 20px 80px;
            font-size: 35px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: white;
            background: linear-gradient(to bottom, var(--hot-pink), #ff0044);
            border: 4px solid white;
            border-radius: 100px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            cursor: pointer;
            -webkit-appearance: none; /* Fix for iPad button styling */
        }

        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 500;
            justify-content: center; align-items: center;
            font-size: 20vh;
            color: var(--neon-yellow);
            text-shadow: 0 0 30px var(--hot-pink);
        }

        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 1000;
        }

        #video-blur-bg {
            position: absolute;
            width: 110%; height: 110%;
            top: -5%; left: -5%;
            object-fit: cover;
            filter: blur(30px) brightness(0.5);
        }

        #game-video {
            position: relative;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 1001;
        }
    </style>
</head>
<body>

    <video id="bg-video-main" autoplay muted loop playsinline webkit-playsinline>
        <source src="background-loop.mp4" type="video/mp4">
    </video>

    <div class="game-area">
        <div class="banner-spacer"></div> <div id="game-grid">
            <div class="box" id="box-0"></div>
            <div class="box" id="box-1"></div>
            <div class="box" id="box-2"></div>
            <div class="box" id="box-3"></div>
            <div class="box" id="box-4"></div>
            <div class="box" id="box-5"></div>
            <div class="box" id="box-6"></div>
            <div class="box" id="box-7"></div>
            <div class="box" id="box-8"></div>
            <div class="box" id="box-9"></div>
        </div>

        <button id="start-btn">START</button>
    </div>

    <div id="countdown-overlay"></div>

    <div id="video-overlay">
        <video id="video-blur-bg" muted playsinline webkit-playsinline></video>
        <video id="game-video" playsinline webkit-playsinline></video>
    </div>

    <audio id="sfx-shimmer" src="shimmer.mp3" loop preload="auto"></audio>
    <audio id="sfx-reveal" src="reveal.mp3" preload="auto"></audio>

    <script>
        const songVideos = ["song1.mp4", "song2.mp4", "song3.mp4", "song4.mp4", "song5.mp4"];
        const goodJobVideo = "good-job.mp4";
        
        const startBtn = document.getElementById('start-btn');
        const boxes = document.querySelectorAll('.box');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const videoOverlay = document.getElementById('video-overlay');
        const mainVideo = document.getElementById('game-video');
        const blurVideo = document.getElementById('video-blur-bg');
        const shimmerSfx = document.getElementById('sfx-shimmer');
        const revealSfx = document.getElementById('sfx-reveal');

        startBtn.addEventListener('click', function() {
            // Unblock and Reset Media
            shimmerSfx.play().then(() => shimmerSfx.pause());
            revealSfx.play().then(() => revealSfx.pause());
            mainVideo.play().then(() => mainVideo.pause());

            this.style.visibility = 'hidden';
            
            let count = 0;
            let target = 15 + Math.floor(Math.random() * 10);
            
            shimmerSfx.currentTime = 0;
            shimmerSfx.play();

            const roulette = setInterval(() => {
                boxes.forEach(b => b.classList.remove('shimmer'));
                boxes[count % 10].classList.add('shimmer');
                count++;

                if (count >= target) {
                    clearInterval(roulette);
                    shimmerSfx.pause();
                    revealSfx.play();
                    
                    setTimeout(() => {
                        startCountdown(count % 5);
                    }, 1000);
                }
            }, 130);
        });

        function startCountdown(songIdx) {
            countdownOverlay.style.display = 'flex';
            const steps = ["READY?", "3", "2", "1"];
            
            let i = 0;
            const nextStep = () => {
                if (i < steps.length) {
                    countdownOverlay.innerText = steps[i];
                    i++;
                    setTimeout(nextStep, 900);
                } else {
                    countdownOverlay.style.display = 'none';
                    playSong(songVideos[songIdx]);
                }
            };
            nextStep();
        }

        function playSong(src) {
            videoOverlay.style.display = 'block';
            mainVideo.src = src;
            blurVideo.src = src;
            mainVideo.load();
            blurVideo.load();
            mainVideo.play();
            blurVideo.play();

            mainVideo.onended = () => {
                if (!mainVideo.src.includes(goodJobVideo)) {
                    mainVideo.src = goodJobVideo;
                    blurVideo.src = goodJobVideo;
                    mainVideo.load();
                    mainVideo.play();
                    blurVideo.play();
                } else {
                    videoOverlay.style.display = 'none';
                    startBtn.style.visibility = 'visible';
                    boxes.forEach(b => b.classList.remove('shimmer'));
                }
            };
        }
    </script>
</body>
</html>
