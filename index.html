<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SING PARTY!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffcc00;
            --royal-purple: #9d00ff;
            --game-scale: 26vh; 
        }
        body {
            background: #000; color: #fff; font-family: 'Fredoka', sans-serif;
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            touch-action: manipulation;
        }
        #bg-video-main {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
        }
        .banner-space { height: 32vh; }
        .game-area-bottom {
            height: 68vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #game-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 2vh; 
            padding: 2vh;
        }
        /* New Box Design: No PNG needed, high-end iPad look */
        .box {
            width: var(--game-scale); height: var(--game-scale);
            border: 0.6vh solid var(--royal-purple); border-radius: 4vh;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 2vh rgba(157, 0, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 8vh;
        }
        .box::after { content: '🎤'; opacity: 0.3; }

        .box.shimmer {
            border-color: var(--gold) !important;
            box-shadow: 0 0 10vh var(--gold) !important;
            transform: scale(1.1); z-index: 10;
            background: rgba(255, 204, 0, 0.2);
        }
        #start-btn {
            margin-top: 3vh; padding: 2vh 10vw; font-size: 6vh;
            font-weight: 700; cursor: pointer; color: white; border: none;
            background: linear-gradient(45deg, var(--royal-purple), var(--gold));
            border-radius: 100px; box-shadow: 0 0 4vh var(--royal-purple);
        }
        #video-overlay {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: black; z-index: 600;
        }
        #game-video { width: 100%; height: 100%; object-fit: contain; }
        #countdown-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 700; justify-content: center; align-items: center;
            font-size: 30vh; color: var(--gold); font-weight: bold;
        }
    </style>
</head>
<body>

    <video id="bg-video-main" autoplay muted loop playsinline webkit-playsinline>
        <source src="background-loop.mp4" type="video/mp4">
    </video>

    <div class="banner-space"></div>

    <div class="game-area-bottom">
        <div id="game-grid">
            <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
            <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
        </div>
        <button id="start-btn" onclick="startApp()">SING!</button>
    </div>

    <div id="countdown-overlay">READY?</div>

    <div id="video-overlay">
        <video id="game-video" playsinline webkit-playsinline></video>
    </div>

    <audio id="sfx-shimmer" src="shimmer.mp3" loop></audio>
    <audio id="sfx-stop" src="reveal.mp3"></audio>

    <script>
        const songVideos = ["song1.mp4", "song2.mp4", "song3.mp4", "song4.mp4", "song5.mp4"];
        const goodJobFile = "good-job.mp4";
        const videoPlayer = document.getElementById('game-video');
        const overlay = document.getElementById('video-overlay');
        const startBtn = document.getElementById('start-btn');

        function startApp() {
            // Fullscreen iPad
            const elem = document.documentElement;
            if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            
            // "Unlock" the player so it doesn't block songs
            videoPlayer.play().then(() => { videoPlayer.pause(); });

            runSelectionCycle();
        }

        function runSelectionCycle() {
            startBtn.style.visibility = 'hidden';
            document.getElementById('sfx-shimmer').play();
            let count = 0;
            let totalSteps = 20 + Math.floor(Math.random() * 10);
            const boxes = document.querySelectorAll('.box');

            const interval = setInterval(() => {
                boxes.forEach(b => b.classList.remove('shimmer'));
                boxes[count % 10].classList.add('shimmer');
                count++;
                if (count > totalSteps) {
                    clearInterval(interval);
                    document.getElementById('sfx-shimmer').pause();
                    document.getElementById('sfx-shimmer').currentTime = 0;
                    startCountdown(count % 10);
                }
            }, 120);
        }

        function startCountdown(boxIndex) {
            document.getElementById('sfx-stop').play();
            const countOverlay = document.getElementById('countdown-overlay');
            countOverlay.style.display = 'flex';
            let timer = 3;
            
            // Critical Fix: Map 10 boxes to 5 songs using modulo % 5
            const selectedSong = songVideos[boxIndex % 5];
            videoPlayer.src = selectedSong;
            videoPlayer.load();

            const countInterval = setInterval(() => {
                if (timer > 0) {
                    countOverlay.innerText = timer;
                    timer--;
                } else if (timer === 0) {
                    countOverlay.innerText = "GO!";
                    timer--;
                } else {
                    clearInterval(countInterval);
                    countOverlay.style.display = 'none';
                    overlay.style.display = 'block';
                    
                    // PLAY FULL FILE - No timer will cut this
                    videoPlayer.play();
                }
            }, 800);
        }

        // Listener: Play next video only when the current one hits the physical end
        videoPlayer.addEventListener('ended', function() {
            if (!videoPlayer.src.includes(goodJobFile)) {
                // Song ended naturally -> Now play Good Job
                videoPlayer.src = goodJobFile;
                videoPlayer.load();
                videoPlayer.play();
            } else {
                // Good Job ended -> Back to grid
                overlay.style.display = 'none';
                startBtn.style.visibility = 'visible';
                document.querySelectorAll('.box').forEach(b => b.classList.remove('shimmer'));
            }
        });
    </script>
</body>
</html>
