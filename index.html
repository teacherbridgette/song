<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SING PARTY!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffcc00;
            --royal-purple: #9d00ff;
            --game-scale: 35vh; /* Slightly larger boxes since there are only 5 */
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        #bg-video-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Fullscreen Toggle Widget */
        #fullscreen-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .banner-space { height: 35vh; }

        .game-area-bottom {
            height: 65vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-grid {
            display: flex;
            justify-content: center;
            gap: 3vh;
            z-index: 1;
            width: 90%;
        }

        .box {
            width: var(--game-scale); 
            height: var(--game-scale);
            border: 0.6vh solid var(--royal-purple);
            border-radius: 5vh;
            background-image: url('box-design.png');
            background-size: cover;
            background-position: center;
            background-color: rgba(0,0,0,0.4);
            box-shadow: 0 0 3vh rgba(157, 0, 255, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box.shimmer {
            border-color: var(--gold) !important;
            box-shadow: 0 0 12vh var(--gold) !important;
            transform: scale(1.15);
            z-index: 10;
        }

        #start-btn {
            margin-top: 5vh;
            padding: 2.5vh 12vw;
            font-size: 7vh;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(45deg, var(--royal-purple), var(--gold));
            color: white;
            border: none;
            border-radius: 100px;
            box-shadow: 0 0 5vh var(--royal-purple);
            z-index: 10;
        }

        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 2000;
        }

        #game-video {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            font-size: 30vh;
            color: var(--gold);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <video id="bg-video-main" autoplay muted loop playsinline webkit-playsinline>
        <source src="background-loop.mp4" type="video/mp4">
    </video>

    <div id="fullscreen-btn" onclick="toggleFullScreen()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    </div>

    <div class="banner-space"></div>

    <div class="game-area-bottom">
        <div id="game-grid">
            <div class="box" id="box-0"></div>
            <div class="box" id="box-1"></div>
            <div class="box" id="box-2"></div>
            <div class="box" id="box-3"></div>
            <div class="box" id="box-4"></div>
        </div>
        <button id="start-btn" onclick="unlockAndStart()">SING!</button>
    </div>

    <div id="countdown-overlay">READY?</div>

    <div id="video-overlay">
        <video id="game-video" playsinline webkit-playsinline></video>
    </div>

    <audio id="sfx-shimmer" src="shimmer.mp3" loop></audio>
    <audio id="sfx-stop" src="reveal.mp3"></audio>

    <script>
        const songVideos = ["song1.mp4", "song2.mp4", "song3.mp4", "song4.mp4", "song5.mp4"];
        const goodJobVideo = "good-job.mp4";
        
        const videoPlayer = document.getElementById('game-video');
        const overlay = document.getElementById('video-overlay');
        const startBtn = document.getElementById('start-btn');
        const boxes = document.querySelectorAll('.box');

        function toggleFullScreen() {
            const docEl = document.documentElement;
            const request = docEl.webkitRequestFullscreen || docEl.requestFullscreen;
            if (request) request.call(docEl);
            // Pre-warm audio context
            videoPlayer.play().then(() => videoPlayer.pause());
        }

        function unlockAndStart() {
            // Force Fullscreen on iPad
            if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
            
            // iPad sound unlock
            videoPlayer.play().then(() => {
                videoPlayer.pause();
                videoPlayer.muted = false;
            }).catch(e => console.log("Unlock error", e));

            runSelectionCycle();
        }

        function runSelectionCycle() {
            startBtn.style.visibility = 'hidden';
            document.getElementById('sfx-shimmer').play();
            
            let count = 0;
            let totalSteps = 15 + Math.floor(Math.random() * 10);

            const interval = setInterval(() => {
                boxes.forEach(b => b.classList.remove('shimmer'));
                boxes[count % 5].classList.add('shimmer');
                count++;
                if (count > totalSteps) {
                    clearInterval(interval);
                    document.getElementById('sfx-shimmer').pause();
                    document.getElementById('sfx-shimmer').currentTime = 0;
                    startCountdown(count % 5);
                }
            }, 130);
        }

        function startCountdown(boxIndex) {
            document.getElementById('sfx-stop').play();
            const countOverlay = document.getElementById('countdown-overlay');
            countOverlay.style.display = 'flex';
            let timer = 3;
            
            // Link box directly to song
            videoPlayer.src = songVideos[boxIndex];
            videoPlayer.load();

            const countInterval = setInterval(() => {
                if (timer > 0) {
                    countOverlay.innerText = timer;
                    timer--;
                } else if (timer === 0) {
                    countOverlay.innerText = "GO!";
                    timer--;
                } else {
                    clearInterval(countInterval);
                    countOverlay.style.display = 'none';
                    overlay.style.display = 'block';
                    videoPlayer.play(); // Plays the FULL song
                }
            }, 800);
        }

        // Seamless transition logic
        videoPlayer.addEventListener('ended', function() {
            if (!videoPlayer.src.includes(goodJobVideo)) {
                videoPlayer.src = goodJobVideo;
                videoPlayer.load();
                videoPlayer.play();
            } else {
                overlay.style.display = 'none';
                startBtn.style.visibility = 'visible';
                boxes.forEach(b => b.classList.remove('shimmer'));
            }
        });
    </script>
</body>
</html>
